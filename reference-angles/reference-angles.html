<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reference Angles</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0f172a;
  color: #e2e8f0;
  font-family: Georgia, serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  user-select: none;
  gap: 10px;
}
canvas { cursor: crosshair; display: block; touch-action: none; }
.tabs {
  display: flex;
  gap: 8px;
}
.tabs button {
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 8px;
  color: #64748b;
  padding: 8px 22px;
  cursor: pointer;
  font: 16px Georgia, serif;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.tabs button[data-q="2"].on { background: rgba(96,165,250,0.15);  border-color: #60a5fa; color: #93c5fd; }
.tabs button[data-q="3"].on { background: rgba(167,139,250,0.15); border-color: #a78bfa; color: #c4b5fd; }
.tabs button[data-q="4"].on { background: rgba(52,211,153,0.15);  border-color: #34d399; color: #6ee7b7; }
.tabs button:hover:not(.on) { background: #273449; color: #cbd5e1; }
.hint { font-size: 11px; color: #334155; letter-spacing: 0.05em; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="tabs">
  <button id="bII"  data-q="2">Quadrant II</button>
  <button id="bIII" data-q="3">Quadrant III</button>
  <button id="bIV"  data-q="4">Quadrant IV</button>
</div>
<div class="hint">drag the point · click anywhere in quadrant I</div>

<script>
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');

const SZ = Math.min(window.innerWidth - 16, window.innerHeight - 130, 560);
cv.width = SZ; cv.height = SZ;

const OX = SZ / 2, OY = SZ / 2, R = SZ * 0.365;

let alpha = Math.PI / 4;   // reference angle, always kept in (0, π/2)
let drag  = false;
const show = { 2: false, 3: false, 4: false };

// Colors per quadrant
const QC = {
  1: { fill: 'rgba(245,158,11,0.14)',  stroke: '#f59e0b', dot: '#fbbf24', text: '#fde68a' },
  2: { fill: 'rgba(96,165,250,0.11)',  stroke: '#60a5fa', dot: '#60a5fa', text: '#93c5fd' },
  3: { fill: 'rgba(167,139,250,0.11)', stroke: '#a78bfa', dot: '#a78bfa', text: '#c4b5fd' },
  4: { fill: 'rgba(52,211,153,0.11)',  stroke: '#34d399', dot: '#34d399', text: '#6ee7b7' },
};

function segment(x1, y1, x2, y2, color, lw, dash=[]) {
  ctx.beginPath();
  ctx.setLineDash(dash);
  ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
  ctx.strokeStyle = color; ctx.lineWidth = lw;
  ctx.stroke();
  ctx.setLineDash([]);
}

// Small perpendicular tick mark at the midpoint of a line segment
function tickMark(x1, y1, x2, y2, color) {
  const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.hypot(dx, dy);
  if (len < 10) return;
  // Perpendicular unit vector
  const px = -dy / len, py = dx / len;
  const s = 5;
  segment(mx - px*s, my - py*s, mx + px*s, my + py*s, color, 1.5);
}

// Small square at a right-angle corner
function rightAngleMark(fx, fy, hDir, vDir) {
  const s = SZ * 0.018;
  ctx.beginPath();
  ctx.moveTo(fx + hDir*s, fy);
  ctx.lineTo(fx + hDir*s, fy + vDir*s);
  ctx.lineTo(fx, fy + vDir*s);
  ctx.strokeStyle = 'rgba(148,163,184,0.35)';
  ctx.lineWidth = 1;
  ctx.stroke();
}

function drawTriangle(q) {
  const c = QC[q];
  const cosA = Math.cos(alpha), sinA = Math.sin(alpha);

  // x/y signs per quadrant
  const sx = (q === 1 || q === 4) ? 1 : -1;
  const sy = (q === 1 || q === 2) ? 1 : -1;

  // Endpoint on circle (canvas coords)
  const ex = OX + R * sx * cosA;
  const ey = OY - R * sy * sinA;

  // Foot of the perpendicular on the x-axis
  const fx = ex, fy = OY;

  // Filled triangle
  ctx.beginPath();
  ctx.moveTo(OX, OY);
  ctx.lineTo(fx, fy);
  ctx.lineTo(ex, ey);
  ctx.closePath();
  ctx.fillStyle = c.fill;
  ctx.fill();

  // Right-angle mark at the foot
  // hDir: horizontal direction from foot toward origin; vDir: canvas y toward endpoint
  rightAngleMark(fx, fy, -sx, (sy === 1) ? -1 : 1);

  // Hypotenuse (radius)
  segment(OX, OY, ex, ey, c.stroke, q === 1 ? 3 : 2.5);

  // Horizontal leg
  if (cosA > 0.06) {
    segment(OX, OY, fx, fy, c.stroke, q === 1 ? 2.5 : 2);
    tickMark(OX, OY, fx, fy, c.stroke);
  }

  // Vertical leg
  if (sinA > 0.06) {
    segment(fx, fy, ex, ey, c.stroke, q === 1 ? 3.5 : 3);
    tickMark(fx, fy, ex, ey, c.stroke);
  }

  // Endpoint dot
  ctx.beginPath(); ctx.arc(ex, ey, q === 1 ? 11 : 9, 0, Math.PI*2);
  ctx.fillStyle = c.dot; ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
}

function draw() {
  ctx.clearRect(0, 0, SZ, SZ);

  const cosA = Math.cos(alpha), sinA = Math.sin(alpha);

  // Faint grid rings
  [0.33, 0.67].forEach(f => {
    ctx.beginPath(); ctx.arc(OX, OY, R*f, 0, Math.PI*2);
    ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 1; ctx.stroke();
  });

  // Axes
  ctx.strokeStyle = '#334155'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(OX - R*1.2, OY); ctx.lineTo(OX + R*1.2, OY);
  ctx.moveTo(OX, OY - R*1.2); ctx.lineTo(OX, OY + R*1.2);
  ctx.stroke();

  // Axis labels
  ctx.fillStyle = '#475569'; ctx.font = `${SZ*.03}px Georgia`; ctx.textAlign = 'center';
  ctx.fillText('x', OX + R*1.17, OY - 6);
  ctx.fillText('y', OX + 10,     OY - R*1.15);

  // Quadrant labels (very faint)
  ctx.font = `${SZ*.04}px Georgia`; ctx.fillStyle = 'rgba(148,163,184,0.07)';
  ctx.textAlign = 'right'; ctx.fillText('I',   OX + R*1.1, OY - R*0.8);
  ctx.textAlign = 'left';  ctx.fillText('II',  OX - R*1.1, OY - R*0.8);
  ctx.textAlign = 'left';  ctx.fillText('III', OX - R*1.1, OY + R*0.92);
  ctx.textAlign = 'right'; ctx.fillText('IV',  OX + R*1.1, OY + R*0.92);

  // Unit circle
  ctx.beginPath(); ctx.arc(OX, OY, R, 0, Math.PI*2);
  ctx.strokeStyle = '#475569'; ctx.lineWidth = 1.5; ctx.stroke();

  // Draw toggled quadrant triangles behind Q1
  if (show[3]) drawTriangle(3);
  if (show[2]) drawTriangle(2);
  if (show[4]) drawTriangle(4);

  // Q1 always on top
  drawTriangle(1);

  // Reference angle arc
  ctx.beginPath(); ctx.arc(OX, OY, R * 0.13, 0, -alpha, true);
  ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 2; ctx.stroke();

  // Degree label inside the arc
  const deg  = (alpha * 180 / Math.PI).toFixed(1);
  const cStr = cosA.toFixed(3);
  const sStr = sinA.toFixed(3);
  const midA = alpha / 2;
  const arcLabelR = R * 0.32;
  ctx.font = `bold ${SZ*.044}px Georgia`; ctx.fillStyle = '#f59e0b';
  ctx.textAlign = 'center';
  ctx.fillText(`${deg}°`,
    OX + arcLabelR * Math.cos(midA),
    OY - Math.max(arcLabelR * Math.sin(midA), SZ * 0.025) + 6);

  // Coordinate labels floating near each endpoint dot
  const offset = SZ * 0.075;
  ctx.font = `${SZ*.028}px Georgia`;
  [
    [1, ` ${cStr}`,  ` ${sStr}`,  true   ],
    [2, `−${cStr}`,  ` ${sStr}`,  show[2]],
    [3, `−${cStr}`, `−${sStr}`,  show[3]],
    [4, ` ${cStr}`, `−${sStr}`,  show[4]],
  ].forEach(([q, xPart, yPart, visible]) => {
    if (!visible) return;
    const sx = (q === 1 || q === 4) ? 1 : -1;
    const sy = (q === 1 || q === 2) ? 1 : -1;
    const ex = OX + R * sx * cosA;
    const ey = OY - R * sy * sinA;
    // Offset radially outward from the origin
    const lx = ex + sx * cosA * offset;
    const ly = ey - sy * sinA * offset;
    ctx.textAlign = sx > 0 ? 'left' : 'right';
    ctx.fillStyle = QC[q].text;
    ctx.fillText(`(${xPart},  ${yPart} )`, lx, ly + 4);
  });
}

function clampToQ1(angle) {
  return Math.max(0.02, Math.min(Math.PI / 2 - 0.02, angle));
}

function angleFrom(e) {
  const rect = cv.getBoundingClientRect();
  const sx = SZ / rect.width, sy = SZ / rect.height;
  const cx = (e.touches ? e.touches[0].clientX : e.clientX);
  const cy = (e.touches ? e.touches[0].clientY : e.clientY);
  const raw = Math.atan2(-((cy - rect.top)*sy - OY), (cx - rect.left)*sx - OX);
  return clampToQ1(raw);
}

cv.addEventListener('mousedown',  e => { drag = true;  alpha = angleFrom(e); draw(); });
cv.addEventListener('mousemove',  e => { if (drag) { alpha = angleFrom(e); draw(); } });
document.addEventListener('mouseup',   () => { drag = false; });
cv.addEventListener('touchstart', e => { e.preventDefault(); drag = true;  alpha = angleFrom(e); draw(); }, { passive: false });
cv.addEventListener('touchmove',  e => { e.preventDefault(); if (drag) { alpha = angleFrom(e); draw(); } }, { passive: false });
document.addEventListener('touchend',  () => { drag = false; });

document.querySelectorAll('.tabs button').forEach(btn => {
  const q = Number(btn.dataset.q);
  btn.addEventListener('click', () => {
    show[q] = !show[q];
    btn.classList.toggle('on', show[q]);
    draw();
  });
});

draw();
</script>
</body>
</html>
