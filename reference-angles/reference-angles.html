<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reference Angles</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0f172a;
  color: #e2e8f0;
  font-family: Georgia, serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  user-select: none;
  gap: 10px;
  padding: 6px;
}
canvas { cursor: crosshair; display: block; touch-action: none; }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; align-items: center; }
.btn-row button {
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 8px;
  color: #64748b;
  padding: 7px 18px;
  cursor: pointer;
  font: 15px Georgia, serif;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.btn-row button:hover:not(.on) { background: #273449; color: #cbd5e1; }
[data-q="1"].on { background: rgba(245,158,11,0.15);  border-color: #f59e0b; color: #fde68a; }
[data-q="2"].on { background: rgba(96,165,250,0.15);  border-color: #60a5fa; color: #93c5fd; }
[data-q="3"].on { background: rgba(167,139,250,0.15); border-color: #a78bfa; color: #c4b5fd; }
[data-q="4"].on { background: rgba(52,211,153,0.15);  border-color: #34d399; color: #6ee7b7; }
[data-ratio="sin"].on { background: rgba(248,113,113,0.15); border-color: #f87171; color: #fca5a5; }
[data-ratio="cos"].on { background: rgba(52,211,153,0.15);  border-color: #34d399; color: #6ee7b7; }
[data-ratio="tan"].on { background: rgba(250,204,21,0.15);  border-color: #facc15; color: #fde047; }
.sep { color: #334155; padding: 0 2px; font-size: 20px; line-height: 1; }
.angle-row {
  display: flex;
  align-items: center;
  gap: 6px;
  font: 15px Georgia, serif;
  color: #94a3b8;
}
.angle-row input {
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 8px;
  color: #e2e8f0;
  padding: 7px 10px;
  font: 15px Georgia, serif;
  width: 100px;
  text-align: right;
}
.angle-row input:focus { outline: none; border-color: #60a5fa; }
.hint { font-size: 11px; color: #334155; letter-spacing: 0.05em; }
.ref-label {
  display: flex;
  align-items: center;
  gap: 7px;
  color: #64748b;
  cursor: pointer;
  font: 15px Georgia, serif;
  padding: 7px 14px;
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 8px;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.ref-label:hover { background: #273449; color: #cbd5e1; }
.ref-label.on { background: rgba(245,158,11,0.15); border-color: #f59e0b; color: #fde68a; }
.ref-label input[type="checkbox"] { display: none; }
#bRadiusOnly.on { background: rgba(148,163,184,0.15); border-color: #94a3b8; color: #e2e8f0; }
</style>
</head>
<body>
<div class="btn-row">
  <button data-q="1">View Q1 Reference</button>
  <span class="sep">|</span>
  <button data-q="2">Quadrant II</button>
  <button data-q="3">Quadrant III</button>
  <button data-q="4">Quadrant IV</button>
</div>
<canvas id="c"></canvas>
<div class="btn-row">
  <button id="bSin" data-ratio="sin">sin</button>
  <button id="bCos" data-ratio="cos">cos</button>
  <button id="bTan" data-ratio="tan">tan</button>
  <span class="sep">|</span>
  <button id="bRadiusOnly">Radius only</button>
  <button id="bReset">↺ Reset</button>
</div>
<div class="angle-row">
  <span>θ =</span>
  <input id="angleInput" type="number" value="45" min="-7200" max="7200" step="1">
  <span>°</span>
  <span class="sep">|</span>
  <label id="lViewRef" class="ref-label">
    <input type="checkbox" id="cbViewRef"> View Reference Angles
  </label>
</div>
<div class="hint">drag the point anywhere on the circle</div>

<script>
const cv  = document.getElementById('c');
const ctx = cv.getContext('2d');

const SZ  = Math.min(window.innerWidth - 16, window.innerHeight - 200, 500);
cv.width  = SZ;
cv.height = SZ;

const OX = SZ / 2, OY = SZ / 2, R = SZ * 0.365;

// thetaDeg: the displayed angle in degrees (any value, -7200 to 7200 from input, 0-360 from drag)
// alpha:    the reference angle in radians (always in Q1), derived from thetaDeg; global so
//           drawTriangle / drawAngleArc can read it without needing an extra parameter
let thetaDeg = 45;
let alpha    = Math.PI / 4;
let drag     = false;
let prevRaw  = null;   // last raw 0–360° angle seen during a drag, for delta accumulation

const activeRatios = new Set();
let viewQuad       = null;    // null or 1/2/3/4 — tracks which button is highlighted
let savedTheta     = null;    // thetaDeg before a comparison button was pressed
let viewRefAngles  = false;
let radiusOnly     = false;

// ── Angle helpers ─────────────────────────────────────────────────────
function normalize(a) { return ((a % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI); }

function refOf(a) {
  const n = normalize(a);
  if (n <= Math.PI/2)       return n;
  if (n <= Math.PI)         return Math.PI - n;
  if (n <= 3*Math.PI/2)     return n - Math.PI;
  return 2*Math.PI - n;
}

function quadOf(a) {
  const n = normalize(a);
  if (n < Math.PI/2)    return 1;
  if (n < Math.PI)      return 2;
  if (n < 3*Math.PI/2)  return 3;
  return 4;
}

// Normalized radians from current thetaDeg (always in [0, 2π))
function normRad() { return normalize(thetaDeg * Math.PI / 180); }

// ── Quadrant color palette ────────────────────────────────────────────
const QC = {
  1: { fill: 'rgba(245,158,11,0.14)',  stroke: '#f59e0b', dot: '#fbbf24', text: '#fde68a' },
  2: { fill: 'rgba(96,165,250,0.11)',  stroke: '#60a5fa', dot: '#60a5fa', text: '#93c5fd' },
  3: { fill: 'rgba(167,139,250,0.11)', stroke: '#a78bfa', dot: '#a78bfa', text: '#c4b5fd' },
  4: { fill: 'rgba(52,211,153,0.11)',  stroke: '#34d399', dot: '#34d399', text: '#6ee7b7' },
};
// All non-Q1 triangles share one consistent color (gold Q1 stays special as the reference)
const TC = { fill: 'rgba(96,165,250,0.12)', stroke: '#60a5fa', dot: '#93c5fd', text: '#bfdbfe' };
function quadColor(q) { return q === 1 ? QC[1] : TC; }

const RC = {
  sin: { oppPos: '#f87171', oppNeg: '#7f1d1d', hyp: '#60a5fa' },
  cos: { adjPos: '#34d399', adjNeg: '#166534', hyp: '#60a5fa' },
};
const DIM_SIDE = '#1e3a5f';

// ── Drawing helpers ───────────────────────────────────────────────────
function segment(x1, y1, x2, y2, color, lw, dash = []) {
  ctx.beginPath();
  ctx.setLineDash(dash);
  ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
  ctx.strokeStyle = color; ctx.lineWidth = lw;
  ctx.stroke();
  ctx.setLineDash([]);
}

function tickMark(x1, y1, x2, y2, color) {
  const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
  const dx = x2 - x1, dy = y2 - y1, len = Math.hypot(dx, dy);
  if (len < 10) return;
  const px = -dy / len * 5, py = dx / len * 5;
  segment(mx - px, my - py, mx + px, my + py, color, 1.5);
}

function rightAngleMark(fx, fy, hDir, vDir) {
  const s = SZ * 0.018;
  ctx.beginPath();
  ctx.moveTo(fx + hDir * s, fy);
  ctx.lineTo(fx + hDir * s, fy + vDir * s);
  ctx.lineTo(fx, fy + vDir * s);
  ctx.strokeStyle = 'rgba(148,163,184,0.35)';
  ctx.lineWidth = 1;
  ctx.stroke();
}

// ── Full-angle spiral ─────────────────────────────────────────────────
// Draws an Archimedean spiral from 0° to thetaDeg showing the full winding.
// Positive angles wind counterclockwise (standard math); negative → clockwise.
function drawSpiral() {
  const totalRad = thetaDeg * Math.PI / 180;
  const absRad   = Math.abs(totalRad);
  if (absRad < 0.01) return;

  const sign = totalRad >= 0 ? 1 : -1;

  // Cap the visual spiral at 5 full turns so it doesn't fill the canvas
  const maxVisRad   = 10 * Math.PI;
  const drawRad     = Math.min(absRad, maxVisRad);

  // Spiral radius grows by R*0.045 each full revolution
  const rMin            = R * 0.07;
  const rGrowthPerRad   = (R * 0.045) / (2 * Math.PI);

  const steps = Math.max(80, Math.ceil(drawRad * 30));

  ctx.beginPath();
  ctx.setLineDash([]);
  for (let i = 0; i <= steps; i++) {
    const phi = (i / steps) * drawRad;
    const r   = rMin + rGrowthPerRad * phi;
    // Positive math angle → canvas angle decreases (y-axis flip)
    const ca  = -sign * phi;
    const x   = OX + r * Math.cos(ca);
    const y   = OY + r * Math.sin(ca);
    if (i === 0) ctx.moveTo(x, y);
    else         ctx.lineTo(x, y);
  }
  ctx.strokeStyle = 'rgba(245,158,11,0.75)';
  ctx.lineWidth   = 1.8;
  ctx.stroke();

  // Arrowhead at the endpoint — direction from finite difference
  const eps  = 0.05;
  const phi1 = drawRad - eps, phi2 = drawRad;
  const r1   = rMin + rGrowthPerRad * phi1;
  const r2   = rMin + rGrowthPerRad * phi2;
  const ax1  = OX + r1 * Math.cos(-sign * phi1), ay1 = OY + r1 * Math.sin(-sign * phi1);
  const ax2  = OX + r2 * Math.cos(-sign * phi2), ay2 = OY + r2 * Math.sin(-sign * phi2);
  const tAng = Math.atan2(ay2 - ay1, ax2 - ax1);
  const wL   = 9, spread = 0.45;
  ctx.beginPath();
  ctx.moveTo(ax2, ay2);
  ctx.lineTo(ax2 + wL * Math.cos(tAng + Math.PI - spread), ay2 + wL * Math.sin(tAng + Math.PI - spread));
  ctx.moveTo(ax2, ay2);
  ctx.lineTo(ax2 + wL * Math.cos(tAng + Math.PI + spread), ay2 + wL * Math.sin(tAng + Math.PI + spread));
  ctx.strokeStyle = '#f59e0b';
  ctx.lineWidth   = 2;
  ctx.stroke();

  // Degree label in gold, offset outward from the arrowhead tip
  const radDx  = ax2 - OX, radDy = ay2 - OY;
  const radLen = Math.hypot(radDx, radDy) || 1;
  const lOff   = SZ * 0.055;
  const lx     = ax2 + (radDx / radLen) * lOff;
  const ly     = ay2 + (radDy / radLen) * lOff;
  ctx.textAlign = 'center';
  ctx.font      = `bold ${SZ * 0.032}px Georgia`;
  ctx.fillStyle = '#f59e0b';
  ctx.fillText(`${thetaDeg.toFixed(1)}°`, lx, ly + 4);

  // If angle exceeds the visual cap, note the extra rotations
  if (absRad > maxVisRad) {
    const extraTurns = Math.floor((absRad - maxVisRad) / (2 * Math.PI));
    const label = `+${extraTurns + 5} rev`;
    ctx.font      = `${SZ * 0.024}px Georgia`;
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(245,158,11,0.55)';
    ctx.fillText(label, OX, OY + R * 0.18);
  }
}

// ── Angle arc + degree label ──────────────────────────────────────────
// Each arc shows the REFERENCE angle (alpha) measured from the nearest
// x-axis — so all four arcs span the same number of degrees.
// Arc direction formulas (each sweeps exactly alpha radians):
//   Q1: ccw from 0          Q2: cw  from π
//   Q3: ccw from π          Q4: cw  from 0
function drawAngleArc(q) {
  const arcR = R * 0.13;

  let sa, ea, acw;
  if      (q === 1) { sa = 0;        ea = -alpha;          acw = true;  }
  else if (q === 2) { sa = Math.PI;  ea = alpha - Math.PI; acw = false; }
  else if (q === 3) { sa = Math.PI;  ea = Math.PI - alpha; acw = true;  }
  else              { sa = 0;        ea = alpha;            acw = false; }

  ctx.beginPath();
  ctx.arc(OX, OY, arcR, sa, ea, acw);
  const qc = quadColor(q);
  ctx.strokeStyle = qc.stroke;
  ctx.lineWidth   = q === 1 ? 2 : 1.5;
  ctx.stroke();

  // Degree label at midpoint of arc (canvas angles):
  //   Q1: −α/2   Q2: π+α/2   Q3: π−α/2   Q4: α/2
  let midCA;
  if      (q === 1) midCA = -alpha / 2;
  else if (q === 2) midCA = Math.PI + alpha / 2;
  else if (q === 3) midCA = Math.PI - alpha / 2;
  else              midCA = alpha / 2;

  const lR    = R * 0.28;
  const lx    = OX + lR * Math.cos(midCA);
  const lyRaw = OY + lR * Math.sin(midCA);
  const gap   = SZ * 0.022;
  const ly    = (q === 1 || q === 2) ? Math.min(OY - gap, lyRaw) : Math.max(OY + gap, lyRaw);

  const refDeg = (alpha * 180 / Math.PI).toFixed(1);
  ctx.textAlign = 'center';
  ctx.font      = `bold ${SZ * 0.032}px Georgia`;
  ctx.fillStyle = qc.text;
  ctx.fillText(`${refDeg}°`, lx, ly + 5);
}

// ── Triangle ─────────────────────────────────────────────────────────
// isTerminal: true for the quadrant the user's angle actually lands in
function drawTriangle(q, isTerminal) {
  const cosA = Math.cos(alpha), sinA = Math.sin(alpha);
  const sx   = (q === 1 || q === 4) ? 1 : -1;
  const sy   = (q === 1 || q === 2) ? 1 : -1;

  const ex = OX + R * sx * cosA;
  const ey = OY - R * sy * sinA;
  const fx = ex, fy = OY;

  const c      = quadColor(q);
  const dotR   = (q === 1 || isTerminal) ? 11 : 9;

  // Radius-only mode: show just the hypotenuse and endpoint dot
  if (radiusOnly) {
    segment(OX, OY, ex, ey, c.stroke, 2.5);
    ctx.beginPath(); ctx.arc(ex, ey, dotR, 0, Math.PI * 2);
    ctx.fillStyle = c.dot; ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
    return;
  }

  const hlMode = activeRatios.size > 0;

  const hlOpp = activeRatios.has('sin') || activeRatios.has('tan');
  const hlAdj = activeRatios.has('cos') || activeRatios.has('tan');
  const hlHyp = activeRatios.has('sin') || activeRatios.has('cos');

  const HL = 5;
  let hypLW = 2.5;
  let adjLW = 2;
  let oppLW = 3;
  let fillC, hypC, adjC, oppC;

  if (hlMode) {
    fillC = 'rgba(100,116,139,0.07)';
    oppC  = hlOpp ? RC.sin.oppPos : DIM_SIDE;
    adjC  = hlAdj ? RC.cos.adjPos : DIM_SIDE;
    hypC  = hlHyp ? RC.sin.hyp   : DIM_SIDE;
    if (hlOpp) oppLW = HL;
    if (hlAdj) adjLW = HL;
    if (hlHyp) hypLW = HL;
  } else {
    fillC = c.fill;
    hypC = adjC = oppC = c.stroke;
  }

  // Fill
  ctx.beginPath();
  ctx.moveTo(OX, OY); ctx.lineTo(fx, fy); ctx.lineTo(ex, ey);
  ctx.closePath();
  ctx.fillStyle = fillC; ctx.fill();

  rightAngleMark(fx, fy, -sx, sy === 1 ? -1 : 1);

  segment(OX, OY, ex, ey, hypC, hypLW);

  if (cosA > 0.06) {
    segment(OX, OY, fx, fy, adjC, adjLW);
    if (!hlMode) tickMark(OX, OY, fx, fy, c.stroke);
  }
  if (sinA > 0.06) {
    segment(fx, fy, ex, ey, oppC, oppLW);
    if (!hlMode) tickMark(fx, fy, ex, ey, c.stroke);
  }

  // Dot — slightly larger for Q1 reference and the terminal angle
  ctx.beginPath(); ctx.arc(ex, ey, dotR, 0, Math.PI * 2);
  ctx.fillStyle = c.dot; ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
}

// ── Coordinate label floating near each endpoint dot ─────────────────
function drawCoordLabel(q, cosA, sinA) {
  const sx  = (q === 1 || q === 4) ? 1 : -1;
  const sy  = (q === 1 || q === 2) ? 1 : -1;
  const ex  = OX + R * sx * cosA;
  const ey  = OY - R * sy * sinA;
  const off = SZ * 0.075;
  let lx    = ex + sx * cosA * off;
  let ly    = ey - sy * sinA * off;

  const xPart = sx > 0 ? ` ${cosA.toFixed(3)}` : `−${cosA.toFixed(3)}`;
  const yPart = sy > 0 ? ` ${sinA.toFixed(3)}` : `−${sinA.toFixed(3)}`;
  const text  = `( ${xPart},  ${yPart} )`;

  ctx.font = `${SZ * 0.027}px Georgia`;
  const tw  = ctx.measureText(text).width;
  const pad = SZ * 0.018;

  // Clamp so text stays fully inside canvas
  ctx.textAlign = sx > 0 ? 'left' : 'right';
  if (sx > 0) lx = Math.min(lx, SZ - tw - pad);
  else        lx = Math.max(lx, tw + pad);
  ly = Math.max(pad * 2, Math.min(SZ - pad, ly));

  ctx.fillStyle = quadColor(q).text;
  ctx.fillText(text, lx, ly + 4);
}

// ── Main render ───────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, SZ, SZ);

  // Derive current reference angle and terminal quadrant
  const nr   = normRad();
  alpha      = refOf(nr);
  const qCur = quadOf(nr);
  const cosA = Math.cos(alpha), sinA = Math.sin(alpha);

  // Faint grid rings
  [0.33, 0.67].forEach(f => {
    ctx.beginPath(); ctx.arc(OX, OY, R * f, 0, Math.PI * 2);
    ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 1; ctx.stroke();
  });

  // Axes
  ctx.strokeStyle = '#334155'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(OX - R * 1.2, OY); ctx.lineTo(OX + R * 1.2, OY);
  ctx.moveTo(OX, OY - R * 1.2); ctx.lineTo(OX, OY + R * 1.2);
  ctx.stroke();

  // Axis labels
  ctx.fillStyle = '#475569'; ctx.font = `${SZ * 0.03}px Georgia`; ctx.textAlign = 'center';
  ctx.fillText('x', OX + R * 1.17, OY - 6);
  ctx.fillText('y', OX + 10,       OY - R * 1.15);

  // Quadrant labels (very faint)
  ctx.font = `${SZ * 0.04}px Georgia`; ctx.fillStyle = 'rgba(148,163,184,0.07)';
  ctx.textAlign = 'right'; ctx.fillText('I',   OX + R * 1.1, OY - R * 0.8);
  ctx.textAlign = 'left';  ctx.fillText('II',  OX - R * 1.1, OY - R * 0.8);
  ctx.textAlign = 'left';  ctx.fillText('III', OX - R * 1.1, OY + R * 0.92);
  ctx.textAlign = 'right'; ctx.fillText('IV',  OX + R * 1.1, OY + R * 0.92);

  // Unit circle
  ctx.beginPath(); ctx.arc(OX, OY, R, 0, Math.PI * 2);
  ctx.strokeStyle = '#475569'; ctx.lineWidth = 1.5; ctx.stroke();

  // One point, one triangle — always driven by thetaDeg
  if (!viewRefAngles) drawSpiral();

  drawTriangle(qCur, true);

  if (viewRefAngles) drawAngleArc(qCur);

  // θ label
  ctx.textAlign = 'left';
  ctx.font      = `bold ${SZ * 0.038}px Georgia`;
  ctx.fillStyle = '#cbd5e1';
  ctx.fillText(`θ = ${thetaDeg.toFixed(1)}°`, 14, 34);

  drawCoordLabel(qCur, cosA, sinA);
}

// ── Sync the angle input box ──────────────────────────────────────────
const angleInput = document.getElementById('angleInput');

function syncInput() {
  angleInput.value = thetaDeg.toFixed(1);
}

// ── Drag interaction ──────────────────────────────────────────────────
function angleFromEvent(e) {
  const rect = cv.getBoundingClientRect();
  const scx  = SZ / rect.width, scy = SZ / rect.height;
  const cx   = e.touches ? e.touches[0].clientX : e.clientX;
  const cy   = e.touches ? e.touches[0].clientY : e.clientY;
  // atan2 returns −π to π; normalize to 0–360°
  const raw  = Math.atan2(-((cy - rect.top) * scy - OY), (cx - rect.left) * scx - OX);
  return ((raw * 180 / Math.PI) % 360 + 360) % 360;
}

// Snap thetaDeg to the clicked position while preserving accumulated full-rotation count.
function snapToRaw(rawDeg) {
  const norm = ((thetaDeg % 360) + 360) % 360;
  let delta  = rawDeg - norm;
  if (delta >  180) delta -= 360;
  if (delta < -180) delta += 360;
  thetaDeg = Math.max(-7200, Math.min(7200, thetaDeg + delta));
}

// Accumulate delta from previous raw angle so dragging past 0°/360° keeps counting.
function accumulateDrag(rawDeg) {
  let delta = rawDeg - prevRaw;
  if (delta >  180) delta -= 360;
  if (delta < -180) delta += 360;
  thetaDeg = Math.max(-7200, Math.min(7200, thetaDeg + delta));
  prevRaw  = rawDeg;
}

cv.addEventListener('mousedown', e => {
  exitComparison();   // dragging always returns control to the student
  drag    = true;
  prevRaw = angleFromEvent(e);
  snapToRaw(prevRaw);
  syncInput(); draw();
});
cv.addEventListener('mousemove', e => {
  if (!drag) return;
  accumulateDrag(angleFromEvent(e));
  syncInput(); draw();
});
document.addEventListener('mouseup',  () => { drag = false; prevRaw = null; });

cv.addEventListener('touchstart', e => {
  e.preventDefault();
  exitComparison();
  drag    = true;
  prevRaw = angleFromEvent(e);
  snapToRaw(prevRaw);
  syncInput(); draw();
}, { passive: false });
cv.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!drag) return;
  accumulateDrag(angleFromEvent(e));
  syncInput(); draw();
}, { passive: false });
document.addEventListener('touchend', () => { drag = false; prevRaw = null; });

// ── Angle input ───────────────────────────────────────────────────────
angleInput.addEventListener('change', () => {
  exitComparison();   // typing a new angle exits comparison mode
  const val = parseFloat(angleInput.value);
  if (!isNaN(val) && val >= -7200 && val <= 7200) {
    thetaDeg = val;
  } else {
    syncInput();
  }
  draw();
});

// ── Reset button ──────────────────────────────────────────────────────
document.getElementById('bReset').addEventListener('click', () => {
  exitComparison();
  thetaDeg = refOf(normRad()) * 180 / Math.PI;
  syncInput();
  draw();
});

// ── Quadrant selector — teleports the point; press again to return ────
function exitComparison() {
  if (savedTheta !== null) { thetaDeg = savedTheta; savedTheta = null; }
  viewQuad = null;
  document.querySelectorAll('[data-q]').forEach(b => b.classList.remove('on'));
}

function selectQuad(q) {
  if (viewQuad === q) {
    // Same button again → restore original position
    exitComparison();
  } else {
    if (savedTheta === null) savedTheta = thetaDeg;   // save only on first press
    viewQuad = q;

    // Move the point to that quadrant's equivalent angle
    const refDeg = refOf(normRad()) * 180 / Math.PI;
    if      (q === 1) thetaDeg = refDeg;
    else if (q === 2) thetaDeg = 180 - refDeg;
    else if (q === 3) thetaDeg = 180 + refDeg;
    else              thetaDeg = 360 - refDeg;

    document.querySelectorAll('[data-q]').forEach(b => {
      b.classList.toggle('on', Number(b.dataset.q) === q);
    });
  }
  syncInput();
  draw();
}

document.querySelectorAll('[data-q]').forEach(btn => {
  btn.addEventListener('click', () => selectQuad(Number(btn.dataset.q)));
});

// ── Radius only button ────────────────────────────────────────────────
document.getElementById('bRadiusOnly').addEventListener('click', () => {
  radiusOnly = !radiusOnly;
  document.getElementById('bRadiusOnly').classList.toggle('on', radiusOnly);
  draw();
});

// ── View Reference Angles checkbox ────────────────────────────────────
document.getElementById('cbViewRef').addEventListener('change', e => {
  viewRefAngles = e.target.checked;
  document.getElementById('lViewRef').classList.toggle('on', viewRefAngles);
  draw();
});

// ── Ratio toggle buttons ──────────────────────────────────────────────
document.querySelectorAll('[data-ratio]').forEach(btn => {
  btn.addEventListener('click', () => {
    const r = btn.dataset.ratio;
    activeRatios.has(r) ? activeRatios.delete(r) : activeRatios.add(r);
    btn.classList.toggle('on', activeRatios.has(r));
    draw();
  });
});

draw();
</script>
</body>
</html>
